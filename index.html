<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hermes Onori</title>
  <link rel="icon" type="image/x-icon" href="./assets/logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=Teko:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #07090b;
      --text: #eef3f6;
      --muted: rgba(238,243,246,.58);
      --line: rgba(255,255,255,.08);
      --line-strong: rgba(255,255,255,.16);
      --accent: #c8ff47;
      --shadow: 0 30px 100px rgba(0,0,0,.4);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      overflow: hidden;
      font-family: 'IBM Plex Sans', sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 15% 12%, rgba(200,255,71,.10), transparent 18%),
        radial-gradient(circle at 85% 0%, rgba(255,255,255,.05), transparent 14%),
        linear-gradient(180deg, #0d1114 0%, #07090b 100%);
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: .18;
      background:
        linear-gradient(rgba(255,255,255,.045) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.045) 1px, transparent 1px);
      background-size: 42px 42px;
      mask-image: radial-gradient(circle at center, black 38%, transparent 82%);
    }
    .entry {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 1fr 1fr;
      position: relative;
      isolation: isolate;
    }
    .center-mark {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      z-index: 5;
      width: 112px;
      height: 112px;
      border-radius: 28px;
      border: 1px solid var(--line-strong);
      background: rgba(10,14,18,.86);
      backdrop-filter: blur(18px);
      box-shadow: var(--shadow);
      display: grid;
      place-items: center;
    }
    .center-mark img {
      width: 68%;
      height: 68%;
      object-fit: contain;
      filter: brightness(0) invert(1);
      opacity: .94;
    }
    .choice {
      position: relative;
      display: flex;
      align-items: flex-end;
      text-decoration: none;
      color: inherit;
      padding: clamp(28px, 4vw, 54px);
      overflow: hidden;
      transition: transform .5s ease, filter .5s ease;
    }
    .choice::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(0,0,0,.08), rgba(0,0,0,.56));
      transition: opacity .35s ease;
    }
    .choice::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(200,255,71,.12), transparent 35%, transparent 70%, rgba(255,255,255,.04));
      opacity: 0;
      transition: opacity .35s ease;
    }
    .choice:hover::after { opacity: 1; }
    .choice:hover { transform: scale(1.015); }
    .choice-arg {
      background:
        linear-gradient(90deg, rgba(7,10,12,.86), rgba(7,10,12,.38)),
        url('./assets/hermes-portada3.jpg') center top / cover no-repeat;
    }
    .choice-world {
      background:
        linear-gradient(90deg, rgba(7,10,12,.62), rgba(7,10,12,.82)),
        url('./assets/Portada_final.webp') center center / cover no-repeat;
    }
    .choice-content {
      position: relative;
      z-index: 2;
      width: 100%;
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 24px;
      border-top: 1px solid rgba(255,255,255,.12);
      padding-top: 20px;
    }
    .label-small {
      display: block;
      color: var(--muted);
      font-size: .74rem;
      letter-spacing: .22em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .label-main {
      font-family: 'Teko', sans-serif;
      font-size: clamp(4rem, 10vw, 8rem);
      line-height: .84;
      letter-spacing: .05em;
      text-transform: uppercase;
    }
    .arrow {
      font-size: clamp(1.8rem, 3vw, 2.4rem);
      color: var(--accent);
      flex-shrink: 0;
      transform: translateX(0);
      transition: transform .28s ease;
    }
    .choice:hover .arrow { transform: translateX(8px); }
    .signature {
      position: absolute;
      top: 24px;
      left: 24px;
      z-index: 3;
      color: rgba(255,255,255,.76);
      font-size: .72rem;
      letter-spacing: .24em;
      text-transform: uppercase;
    }
    @media (max-width: 860px) {
      body { overflow: auto; }
      .entry { grid-template-columns: 1fr; grid-template-rows: 1fr 1fr; }
      .center-mark {
        width: 88px;
        height: 88px;
        border-radius: 24px;
      }
      .choice-content {
        align-items: center;
      }
      .label-main {
        font-size: clamp(3.4rem, 14vw, 5.8rem);
      }
    }
    @media (max-width: 560px) {
      .signature {
        top: 16px;
        left: 16px;
        font-size: .64rem;
      }
      .choice {
        padding: 22px 18px;
      }
      .choice-content {
        padding-top: 16px;
      }
      .center-mark {
        width: 74px;
        height: 74px;
        border-radius: 20px;
      }
    }
  </style>
</head>
<body>
  <main class="entry">
    <div class="center-mark"><img src="./assets/triskel.png" alt="Hermes Onori"></div>

    <a href="pagina1.html" class="choice choice-arg">
      <span class="signature">Hermes Onori</span>
      <div class="choice-content">
        <div>
          <span class="label-small">Local access</span>
          <div class="label-main">Argentina</div>
        </div>
        <div class="arrow">→</div>
      </div>
    </a>

    <a href="pagina2.html" class="choice choice-world">
      <span class="signature">Hermes Onori</span>
      <div class="choice-content">
        <div>
          <span class="label-small">International access</span>
          <div class="label-main">Worldwide</div>
        </div>
        <div class="arrow">→</div>
      </div>
    </a>
  </main>
</body>
</html>
